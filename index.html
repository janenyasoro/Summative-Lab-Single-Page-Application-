<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wordly Dictionary SPA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Wordly Dictionary</h1>
  </header>

  <!-- Search form -->
  <form id="search-form">
    <input type="text" id="search-input" placeholder="Enter a word" aria-label="Word to search">
    <button type="submit">Search</button>
  </form>

  <!-- Container for top word + audio -->
  <section id="top-word-container"></section>

  <!-- Container for POS sections (nouns, verbs, etc.) -->
  <section id="pos-sections-container"></section>

  <script src="script.js"></script>
</body>
</html>
